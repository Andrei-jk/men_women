<html lang="en">
<head>

    <title>men & women</title>
    <link rel="preconnect" href="fonts/Inter,Varela_Round/Varela_Round/VarelaRound-Regular.ttf">

</head>
<body>
<div class="wrapper">
    <header>
        <div class="logo">
            <img src="./img/man-woman-icon.webp" alt="">
        </div>
        <div class="menu">
            <ul>
                <li><a href="#">all clothings</a></li>
                <li><a href="#">new in</a></li>
                <li><a href="#">editorial</a></li>
                <li><a href="#">outwear</a></li>
                <li><a href="#">collection</a></li>
            </ul>
        </div>

    <div class="content">
        <div class="men common">
            <div class="img">
                <img src="img/men.webp" alt="">
                <div class="img_overlay"></div>
            </div>

                <h1>Men</h1>
                <h5>Fashion</h5>
            </div>
            <div class="btn">

            </div>
        </div>
        <div class="women common">
              <div class="img">
                <img src="img/women.jpg" alt="">
                <div class="img_overlay"></div>
            </div>
            <div class="text">
                <h1>Women</h1>

            </div>
             <div class="btn">
                <a href="#">Shop Now</a>
            </div>
        </div>

</div>
